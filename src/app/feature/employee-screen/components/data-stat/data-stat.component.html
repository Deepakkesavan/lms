<div class="card-styles">
    <ngce-card [customStyles]="cardStyles">
        <ngce-card-header [customStyles]="cardHeaderStyle">
            <div class="icon-heading">
                <ngce-icon class="head-icon" [ngClass]="cardData()?.iconClassName" size="18px"
                    [color]="cardData()?.iconColor" [ngStyle]="{'background-color': cardData()?.iconBackgroundColor}">
                </ngce-icon>

                <h3 class="heading">{{cardData()!.leaveType}}</h3>
            </div>

            <div class="badge-wrapper">
                @if(cardData()?.available !== 0) {
                <span class="status-badge available">Available</span>
                } @else {
                <span class="status-badge none">None Left</span>
                }
            </div>
        </ngce-card-header>
        <ngce-card-content>
            <ngce-divider [customStyles]="contentDividerStyle"></ngce-divider>

            <div class="stat-details">
                <span class="detail-container">
                    <ngce-icon class="ngce-ok-circled2-1" size="14px" color="rgba(34, 197, 94, 1)"></ngce-icon>
                    {{available}}
                </span>
                <span class="stat-value">{{cardData()?.available}}</span>
            </div>
            <div class="stat-details">
                <span class="detail-container">
                    <ngce-icon class="ngce-calendar-check-o" size="14px" color="var(--primary)"></ngce-icon>
                    {{booked}}
                </span>
                <span class="stat-value">{{cardData()?.booked}}</span>
            </div>

        </ngce-card-content>
    </ngce-card>
</div>



<ng-template #Available>
    <span class="status"
        [ngStyle]="{'background-color': 'rgba(220, 252, 231, 1)', 'color': 'rgba(34, 197, 94, 1)', 'border': '1px solid rgb(220, 252, 231, 1)', 'font-weight': '500'}">Available</span>
</ng-template>

<ng-template #NotAvailable>
    <span class="status"
        [ngStyle]="{'background-color':'rgb(254, 242, 242)', 'color':'rgb(185, 28, 28)', 'border': '1px solid rgb(254, 226, 226)'}">None
        Left</span>
</ng-template>
